<script>
(function() {
  var DEBUG = true;
  function log() { if (DEBUG && window.console) console.log.apply(console, ['[sortHover]'].concat([].slice.call(arguments))); }

  var styleAdded = false;
  function addStyle() {
    if (styleAdded) return;
    styleAdded = true;
    var s = document.createElement('style');
    // Cover every place Plotly might render a hover/cursor tooltip.
    s.textContent = [
      '.hoverlayer{visibility:hidden!important;pointer-events:none!important}',
      '.hoverlayer .legend{visibility:hidden!important}',
      '.hoverlayer .hovertext{visibility:hidden!important}',
      '.hoverlayer text{visibility:hidden!important}',
      '.hoverlayer rect{visibility:hidden!important}',
      '.hoverlayer path{visibility:hidden!important}'
    ].join('');
    document.head.appendChild(s);
    log('native hover hidden via CSS');
  }
  function makeTooltip() {
    var t = document.createElement('div');
    t.className = 'sort-hover-tip';
    t.style.cssText = [
      'position:fixed', 'pointer-events:none', 'background:rgba(255,255,255,0.97)',
      'border:1px solid rgba(68,68,68,0.45)', 'padding:7px 11px',
      'font:13px Arial,sans-serif', 'border-radius:4px', 'display:none',
      'z-index:2147483647', 'box-shadow:0 3px 10px rgba(0,0,0,0.18)',
      'line-height:1.5', 'white-space:nowrap', 'color:#222'
    ].join(';');
    document.body.appendChild(t);
    return t;
  }
  function fmtNum(v) {
    if (typeof v !== 'number' || !isFinite(v)) return String(v);
    if (Math.round(v) === v) return v.toLocaleString();
    return v.toLocaleString(undefined, { maximumFractionDigits: 2 });
  }
  function fmtX(x) {
    if (x instanceof Date) return x.toDateString();
    if (typeof x === 'string' && /^\d{4}-\d{2}-\d{2}/.test(x)) {
      var d = new Date(x);
      if (!isNaN(d)) return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
    }
    return String(x);
  }
  function traceColor(p) {
    var fd = p.fullData || {};
    var c = (fd.line && fd.line.color) ||
            (fd.marker && fd.marker.color) ||
            fd.color || '#333';
    return c;
  }

  var lastMouse = { x: 0, y: 0 };
  document.addEventListener('mousemove', function(e) {
    lastMouse.x = e.clientX; lastMouse.y = e.clientY;
  }, true);

  function bindGraph(gd, tip) {
    if (gd._sortHoverAttached) return true;
    if (typeof gd.on !== 'function') return false;
    gd._sortHoverAttached = true;
    log('binding plotly_hover for', gd.id || '(no id)');
    gd.on('plotly_hover', function(ed) {
      log('plotly_hover fired with', ed && ed.points && ed.points.length, 'points');
      if (!ed || !ed.points || !ed.points.length) return;
      var pts = ed.points.slice().filter(function(p) { return p.y != null; });
      pts.sort(function(a, b) { return b.y - a.y; });
      var lines = ['<div style="margin-bottom:4px;font-weight:bold">' + fmtX(ed.points[0].x) + '</div>'];
      pts.forEach(function(p) {
        var name = (p.fullData && p.fullData.name) || '';
        var color = traceColor(p);
        lines.push(
          '<span style="display:inline-block;width:10px;height:10px;background:' + color +
          ';border-radius:50%;margin-right:7px;vertical-align:middle"></span>' +
          '<span style="vertical-align:middle">' + name + ': <b>' + fmtNum(p.y) + '</b></span>'
        );
      });
      tip.innerHTML = lines.join('<br>');
      tip.style.display = 'block';
      var w = tip.offsetWidth, h = tip.offsetHeight;
      var left = lastMouse.x + 18, top = lastMouse.y + 18;
      if (left + w > window.innerWidth - 8) left = lastMouse.x - w - 18;
      if (top + h > window.innerHeight - 8) top = lastMouse.y - h - 18;
      tip.style.left = Math.max(4, left) + 'px';
      tip.style.top = Math.max(4, top) + 'px';
    });
    gd.on('plotly_unhover', function() { tip.style.display = 'none'; });
    gd.addEventListener('mouseleave', function() { tip.style.display = 'none'; });
    return true;
  }

  function attach() {
    var divs = document.querySelectorAll('.plotly-graph-div');
    if (!divs.length) { setTimeout(attach, 100); return; }
    addStyle();
    if (!window._sortHoverTip) window._sortHoverTip = makeTooltip();
    var allBound = true;
    divs.forEach(function(gd) {
      if (!bindGraph(gd, window._sortHoverTip)) allBound = false;
    });
    if (!allBound) {
      log('not all graphs ready, retrying...');
      setTimeout(attach, 150);
    } else {
      log('attached to', divs.length, 'graph(s)');
    }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', attach);
  } else {
    attach();
  }
})();
</script>
